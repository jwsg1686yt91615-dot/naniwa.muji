<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NANIWA Portal</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/jwsg1686yt91615-dot/icon/main/naniwa_icon_v1.png">
    <link rel="icon" href="https://raw.githubusercontent.com/jwsg1686yt91615-dot/icon/main/naniwa_icon_v1.png">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --text-color: #ffffff;
            --accent-neon: #ff0033;
            --accent-glow: rgba(255, 0, 51, 0.7);
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        /* アイコン画像：表示されない問題を解決するためにURLをrawに変更 */
        .main-icon {
            width: 100px;
            height: 100px;
            border-radius: 22%;
            box-shadow: 0 0 25px var(--accent-glow);
            margin-bottom: 40px;
            object-fit: cover;
            border: 1px solid var(--accent-neon);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { box-shadow: 0 0 15px var(--accent-glow); }
            to { box-shadow: 0 0 30px var(--accent-neon); }
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 22px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-color);
            border: 1px solid #333;
            transition: 0.3s;
            display: block;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        /* タップ時のネオン発光 */
        .card:active, .card:hover {
            border-color: var(--accent-neon);
            box-shadow: 0 0 20px var(--accent-glow);
            background-color: #1a1a1a;
            color: var(--accent-neon);
        }

        /* 装飾用のネオンライン */
        .card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background-color: var(--accent-neon);
            box-shadow: 0 0 10px var(--accent-neon);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://raw.githubusercontent.com/jwsg1686yt91615-dot/icon/main/naniwa_icon_v1.png" alt="Icon" class="main-icon">
        
        <div class="links">
            <a href="https://jwsg1686yt91615-dot.github.io/shift-kanri/" class="card">
                シフト希望申請
            </a>
            
            <a href="https://jwsg1686yt91615-dot.github.io/muji.picking/view.html" class="card">
                今月分勤務確認
            </a>
        </div>
    </div>
</body>
</html>
