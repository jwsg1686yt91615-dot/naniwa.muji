<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NANIWA Portal</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NANIWA">
    
    <link rel="apple-touch-icon" href="https://github.com/jwsg1686yt91615-dot/icon/blob/main/naniwa_icon_v1.png?raw=true">
    <link rel="icon" href="https://github.com/jwsg1686yt91615-dot/icon/blob/main/naniwa_icon_v1.png?raw=true">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --accent-neon: #ff0033; /* ネオンレッド */
            --accent-glow: rgba(255, 0, 51, 0.6);
        }

        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            /* スマホでのスクロール時のバウンドを防ぐ */
            overflow: hidden; 
        }

        .container {
            width: 100%;
            max-width: 480px; /* スマホに最適な幅 */
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* アニメーション：ふわっと登場 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* アイコン画像のデザイン */
        .main-icon {
            width: 120px;
            height: 120px;
            border-radius: 30px; /* 角丸 */
            box-shadow: 0 0 20px var(--accent-glow);
            margin-bottom: 20px;
            animation: fadeIn 1s ease-out;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 50px;
            color: var(--text-color);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* リンクカードのデザインとアニメーション */
        .card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--text-color);
            border: 1px solid transparent;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            
            /* 初期状態：アニメーション用 */
            opacity: 0;
            transform: translateY(20px);
        }

        /* 登場アニメーション（遅延付き） */
        .card:nth-child(1) { animation: fadeIn 0.8s ease-out 0.6s both; }
        .card:nth-child(2) { animation: fadeIn 0.8s ease-out 0.8s both; }

        /* ホップ/タップ時のネオンエフェクト */
        .card:active, .card:hover {
            transform: translateY(-3px) scale(1.02);
            border-color: var(--accent-neon);
            box-shadow: 0 0 15px var(--accent-glow);
            background-color: #252525;
        }

        .card-text h2 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .card-text p {
            margin: 5px 0 0 0;
            font-size: 0.8rem;
            color: #aaa;
        }

        /* 矢印アイコン */
        .arrow {
            color: var(--accent-neon);
            font-size: 1.2rem;
            text-shadow: 0 0 5px var(--accent-glow);
        }

    </style>
</head>
<body>
    <div class="container">
        <img src="https://github.com/jwsg1686yt91615-dot/icon/blob/main/naniwa_icon_v1.png?raw=true" alt="Icon" class="main-icon">
        
        <h1>NANIWA System</h1>

        <div class="links">
            <a href="https://jwsg1686yt91615-dot.github.io/shift-kanri/" class="card">
                <div class="card-text">
                    <h2>シフト希望申請</h2>
                    <p>来月分の希望を入力</p>
                </div>
                <div class="arrow">▶</div>
            </a>
            
            <a href="https://jwsg1686yt91615-dot.github.io/muji.picking/view.html" class="card">
                <div class="card-text">
                    <h2>今月分勤務確認</h2>
                    <p>確定したシフトの確認</p>
                </div>
                <div class="arrow">▶</div>
            </a>
        </div>
    </div>
</body>
</html>
