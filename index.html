<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-weight: 300;
        }
        .links {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 480px) {
            .links { grid-template-columns: 1fr 1fr; }
        }
        .card {
            background: white;
            padding: 30px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid #eee;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            border-color: #007bff;
        }
        .card h2 {
            margin: 0 0 10px 0;
            font-size: 1.25rem;
            color: #007bff;
        }
        .card p {
            margin: 0;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Project Portal</h1>
        <div class="links">
            <a href="https://jwsg1686yt91615-dot.github.io/shift-kanri/" class="card">
                <h2>シフト管理</h2>
                <p>勤怠・シフト管理システム</p>
            </a>
            <a href="https://jwsg1686yt91615-dot.github.io/muji.picking/view.html" class="card">
                <h2>ピッキング表示</h2>
                <p>在庫・ピッキング管理画面</p>
            </a>
        </div>
    </div>
</body>
</html>
